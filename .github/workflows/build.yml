name: Build Desktop Apps

on:
  push:
    branches:
      - main

jobs:
  # 這是原本的 Windows 打包
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run package-win
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE-成品
          path: dist/

  # 這是新加的 Mac 打包（雲端會啟動一台 Mac 幫你做）
  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run package-mac
      - uses: actions/upload-artifact@v4
        with:
          name: Mac-APP-成品
          path: dist/
