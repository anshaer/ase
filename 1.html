<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D 網頁檢視器</title>
    <!--
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
    -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.3/dist/cubism4.min.js"></script>

    

    <style>
        /* 薄荷巧克力配色主題 */
        :root {
            --mint: #98FF98;
            --mint-dark: #7be07b;
            --choco: #3E2723;
            --choco-light: #5d4037;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--mint);
            color: var(--choco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 控制列樣式 */
        #controls {
            padding: 15px 20px;
            background-color: var(--choco);
            color: var(--mint);
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
            flex-wrap: wrap; /* 確保在小螢幕上能自動折行 */
        }

        .title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: auto;
        }

        /* 隱藏預設的醜陋上傳元件 */
        input[type="file"] {
            display: none;
        }

        /* 自訂上傳按鈕外觀 */
        .custom-file-upload {
            padding: 10px 20px;
            background-color: var(--mint);
            color: var(--choco);
            border: 2px solid var(--mint);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
            text-align: center;
        }

        .custom-file-upload:hover {
            background-color: var(--mint-dark);
            border-color: var(--mint-dark);
            box-shadow: 0 0 8px rgba(152, 255, 152, 0.6);
        }

        #status {
            font-size: 0.9rem;
            color: #ccc;
        }

        /* 畫布容器 */
        #canvas-container {
            flex-grow: 1;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* 防止手機觸控時產生預設滾動行為 */
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="title">Live2D Viewer</div>
        <span id="status">等待載入模型...</span>
        
        <label for="folderInput" class="custom-file-upload">
            📁 載入本機模型資料夾
        </label>
        <input type="file" id="folderInput" webkitdirectory multiple>
    </div>

    <div id="canvas-container"></div>

   <script>
        const container = document.getElementById('canvas-container');
        const app = new PIXI.Application({
            resizeTo: container,
            transparent: true,
            backgroundAlpha: 0 
        });
        container.appendChild(app.view);

        let currentModel = null;
        const statusText = document.getElementById('status');

        async function loadLocalLive2D(files) {
            try {
                // 1. 顯示偵測到的檔案總數
                statusText.textContent = `偵測到 ${files.length} 個檔案，正在解析中...`;
                statusText.style.color = "var(--mint)";

                if (currentModel) {
                    app.stage.removeChild(currentModel);
                    currentModel.destroy({ children: true, texture: true, baseTexture: true });
                    currentModel = null;
                }

                // 2. 解析檔案陣列
                currentModel = await PIXI.live2d.Live2DModel.from(files);

                const scaleX = app.renderer.width / currentModel.width;
                const scaleY = app.renderer.height / currentModel.height;
                currentModel.scale.set(Math.min(scaleX, scaleY) * 0.8); 
                
                currentModel.x = app.renderer.width / 2 - currentModel.width / 2;
                currentModel.y = app.renderer.height / 2 - currentModel.height / 2;

                app.stage.addChild(currentModel);

                app.stage.interactive = true;
                app.stage.on('pointermove', (event) => {
                    if (currentModel) {
                        currentModel.focus(event.data.global.x, event.data.global.y);
                    }
                });

                statusText.textContent = "載入成功！滑鼠移動可觀看面部追蹤。";

            } catch (error) {
                console.error("模型載入發生錯誤:", error);
                // 3. 發生錯誤時，直接印出檔案數與系統錯誤訊息
                statusText.innerHTML = `載入失敗！共讀取 ${files.length} 個檔案。<br>錯誤原因: <span style="color: #ffcccc;">${error.message || error}</span>`;
                statusText.style.color = "#ff6b6b"; 
            }
        }

        document.getElementById('folderInput').addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                loadLocalLive2D(files);
            }
        });

        window.addEventListener('resize', () => {
            if (currentModel) {
                currentModel.x = app.renderer.width / 2 - currentModel.width / 2;
                currentModel.y = app.renderer.height / 2 - currentModel.height / 2;
            }
        });
    </script>

</body>
</html>
